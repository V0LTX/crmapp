databases:
  - name: crm-postgres
    databaseName: crm_app
    user: crm_user

services:
  - type: web
    name: crm-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci && npm run prisma:generate
    startCommand: npm run db:migrate:deploy && npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: crm-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: REJECTED_RETRY_DAYS
        value: "28"
      - key: CORS_CREDENTIALS
        value: "true"
      - key: TRUST_PROXY
        value: "true"
      - key: JSON_BODY_LIMIT
        value: 1mb
      - key: AUTH_RATE_LIMIT_WINDOW_MINUTES
        value: "15"
      - key: AUTH_RATE_LIMIT_MAX
        value: "80"
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: crm-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: crm-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: crm-backend
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
